<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ryerson university</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css">
</head>
<body>
  <div class="login">
    <h1 class="login-heading">Ryerson university</h1>
    <h3 class="login-sub-heading">Toronto, Canada.</h3>
    <form action="#" class="login-form" autocomplete="off">
      <label for="username" class="login-label">
        <input type="text" id="Username" class="login-input username" placeholder="Username">
        <i class="fa-solid fa-user"></i>
      </label>
      <label for="password" class="login-label">
        <input type="password" id="password" class="login-input password" placeholder="Password">
        <i class="fa-solid fa-key "></i>
        <div class="open-eye">
          <i class="bi bi-eye-fill icon"></i>
        </div>
      </label>
      <p class="forgot">
        <span>Forgot your password</span>
        <button class="login-button"><span>LOGIN</span></button>
      </p>
    </form>
    <div class="login-or"><span>or</span></div>
    <div class="link">
      <a href="#" class="tw"><i class="fa-brands fa-twitter"></i></a>
      <a href="#" class="fb"><span>LOGIN WITH FACE BOOK</span></a>
    </div>
    <div class="street">
      <a href="#">350 Victoria Street, Toronto</a>
    </div>
  </div>
  <img src="https://c0.wallpaperflare.com/preview/806/329/190/building-office-building-urban-city.jpg" alt="Ryerson university">
</body>
</html>
